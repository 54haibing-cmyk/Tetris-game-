<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no,
viewport-fit=cover">

<title>PI TETRIS</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{

width:100%;
height:100%;
overflow:hidden;

background:
radial-gradient(circle at top,#0f4d92,#02142d 70%);

font-family:
-apple-system,
BlinkMacSystemFont,
sans-serif;

touch-action:none;
overscroll-behavior:none;

}

/* 主容器 */

.game-shell{

position:relative;

width:min(100vw,500px);

height:100dvh;

margin:0 auto;

overflow:hidden;

padding:
env(safe-area-inset-top)
10px
env(safe-area-inset-bottom);

}

/* 星空 */

.stars{
position:absolute;
inset:0;
overflow:hidden;
}

.star{

position:absolute;

width:3px;
height:3px;

border-radius:50%;

background:white;

animation:
twinkle 3s infinite alternate;

}

@keyframes twinkle{

from{
opacity:.2;
transform:scale(.7);
}

to{
opacity:1;
transform:scale(1.5);
}

}

/* 游戏区域 */

.play-area{

position:absolute;

left:50%;
top:46%;

transform:translate(-50%,-50%);

width:min(58vw,290px);

height:min(116vw,580px);

max-height:72vh;

border-radius:16px;

border:
3px solid rgba(180,220,255,.9);

background:
linear-gradient(
180deg,
rgba(0,90,180,.25),
rgba(0,20,50,.45));

box-shadow:
0 0 30px rgba(100,200,255,.55),
inset 0 0 24px rgba(255,255,255,.08);

overflow:hidden;

}

canvas{
width:100%;
height:100%;
display:block;
}

/* UI */

.left-ui{

position:absolute;

left:3%;
top:13%;

display:flex;
flex-direction:column;
gap:12px;

}

.right-ui{

position:absolute;

right:3%;
top:12%;

display:flex;
flex-direction:column;
align-items:center;
gap:14px;

}

.info-box{

width:70px;

padding:8px 4px;

border-radius:14px;

background:
rgba(0,0,0,.35);

backdrop-filter:blur(8px);

border:
1px solid rgba(255,255,255,.15);

text-align:center;

color:white;

box-shadow:
inset 0 2px 8px rgba(255,255,255,.12);

}

.info-title{
font-size:11px;
opacity:.75;
}

.info-value{
font-size:22px;
font-weight:bold;
}

/* NEXT */

.next-wrap{
text-align:center;
color:white;
font-size:14px;
}

.next-box{

margin-top:6px;

width:72px;
height:72px;

border-radius:14px;

background:
rgba(0,0,0,.35);

backdrop-filter:blur(8px);

border:
1px solid rgba(255,255,255,.15);

display:flex;
justify-content:center;
align-items:center;

}

/* 按钮 */

.controls{

position:absolute;

left:50%;

bottom:max(
16px,
env(safe-area-inset-bottom));

transform:translateX(-50%);

width:min(92vw,430px);

display:flex;

justify-content:center;

gap:14px;

}

.ctrl{

width:56px;
height:56px;

border:none;

border-radius:50%;

font-size:24px;
font-weight:bold;

color:white;

backdrop-filter:blur(8px);

box-shadow:
inset 0 3px 10px rgba(255,255,255,.35),
0 5px 14px rgba(0,0,0,.35);

transition:.08s;

}

.ctrl:active{
transform:scale(.92);
}

.left-btn{
background:
linear-gradient(
180deg,
rgba(130,255,120,.55),
rgba(40,160,40,.18));
}

.right-btn{
background:
linear-gradient(
180deg,
rgba(255,120,255,.55),
rgba(170,50,255,.18));
}

.rotate-btn{
background:
linear-gradient(
180deg,
rgba(255,180,130,.55),
rgba(255,90,60,.2));
}

.down-btn{
background:
linear-gradient(
180deg,
rgba(80,255,255,.55),
rgba(0,160,170,.18));
}

.hard-btn{
background:
linear-gradient(
180deg,
rgba(255,230,120,.6),
rgba(255,150,0,.2));
}

/* 暂停 */

.pause-btn{

width:50px;
height:50px;

border:none;

border-radius:50%;

font-size:22px;

color:white;

background:
linear-gradient(
180deg,
rgba(255,255,255,.45),
rgba(0,130,220,.25));

backdrop-filter:blur(8px);

box-shadow:
inset 0 2px 8px rgba(255,255,255,.3),
0 4px 12px rgba(0,0,0,.35);

}

/* overlay */

.overlay{

position:absolute;

inset:0;

background:
rgba(0,0,0,.55);

display:flex;

flex-direction:column;

justify-content:center;
align-items:center;

z-index:100;

backdrop-filter:blur(8px);

}

.overlay h1{

color:white;

font-size:40px;

margin-bottom:20px;

text-shadow:
0 0 18px #66d9ff;

}

.start-btn{

padding:14px 28px;

border:none;

border-radius:18px;

font-size:20px;

color:white;

background:
linear-gradient(
180deg,
#67d4ff,
#006dff);

box-shadow:
0 8px 18px rgba(0,0,0,.4);

}

/* 动画 */

.levelup{

position:absolute;

left:50%;
top:40%;

transform:translate(-50%,-50%);

font-size:38px;

font-weight:bold;

color:#ffe66b;

text-shadow:
0 0 8px white,
0 0 18px gold,
0 0 30px orange;

opacity:0;

pointer-events:none;

}

.level-show{
animation:lv 1.3s ease;
}

@keyframes lv{

0%{
opacity:0;
transform:
translate(-50%,-50%)
scale(.2);
}

30%{
opacity:1;
transform:
translate(-50%,-50%)
scale(1.25);
}

70%{
opacity:1;
}

100%{
opacity:0;
}

}

.flash{
animation:
flash .18s infinite alternate;
}

@keyframes flash{

from{
filter:brightness(1);
}

to{
filter:
brightness(2.7)
drop-shadow(0 0 20px white);
}

}

</style>
</head>

<body>

<div class="game-shell">

<div class="stars" id="stars"></div>

<!-- 左边 -->

<div class="left-ui">

<div class="info-box">
<div class="info-title">SCORE</div>
<div class="info-value" id="score">0</div>
</div>

<div class="info-box">
<div class="info-title">LINES</div>
<div class="info-value" id="lines">0</div>
</div>

<div class="info-box">
<div class="info-title">LEVEL</div>
<div class="info-value" id="level">1</div>
</div>

</div>

<!-- 右边 -->

<div class="right-ui">

<button
class="pause-btn"
id="pauseBtn">Ⅱ</button>

<div class="next-wrap">

NEXT

<div class="next-box">

<canvas
id="next"
width="70"
height="70"></canvas>

</div>

</div>

</div>

<!-- 游戏区域 -->

<div class="play-area">

<canvas id="board"></canvas>

<div
class="levelup"
id="levelText">

LEVEL UP

</div>

</div>

<!-- 控制 -->

<div class="controls">

<button
class="ctrl left-btn"
id="leftBtn">←</button>

<button
class="ctrl rotate-btn"
id="rotateBtn">↻</button>

<button
class="ctrl right-btn"
id="rightBtn">→</button>

<button
class="ctrl down-btn"
id="downBtn">↓</button>

<button
class="ctrl hard-btn"
id="hardBtn">⇣</button>

</div>

<!-- 开始 -->

<div
class="overlay"
id="overlay">

<h1>PI TETRIS</h1>

<button
class="start-btn"
id="startBtn">

START GAME

</button>

</div>

</div>

<script>

/* 星空 */

const stars =
document.getElementById("stars");

for(let i=0;i<65;i++){

const s =
document.createElement("div");

s.className="star";

s.style.left =
Math.random()*100+"%";

s.style.top =
Math.random()*100+"%";

s.style.animationDelay =
Math.random()*4+"s";

stars.appendChild(s);

}

/* 音效 */

const audioCtx =
new (
window.AudioContext ||
window.webkitAudioContext
)();

function beep(
freq,
time,
type="sine",
vol=.05
){

const osc =
audioCtx.createOscillator();

const gain =
audioCtx.createGain();

osc.type=type;

osc.frequency.value=freq;

gain.gain.value=vol;

osc.connect(gain);

gain.connect(
audioCtx.destination);

osc.start();

setTimeout(()=>{
osc.stop();
},time);

}

/* canvas */

const canvas =
document.getElementById("board");

const ctx =
canvas.getContext("2d");

const dpr =
window.devicePixelRatio || 1;

canvas.width = 300*dpr;
canvas.height = 600*dpr;

ctx.scale(dpr,dpr);

const nextCanvas =
document.getElementById("next");

const nctx =
nextCanvas.getContext("2d");

nextCanvas.width = 70*dpr;
nextCanvas.height = 70*dpr;

nctx.scale(dpr,dpr);

/* 游戏 */

const COLS=10;
const ROWS=20;
const BLOCK=30;

const colors=[
null,
"#67e8f9",
"#fef08c",
"#c084fc",
"#86efac",
"#fb923c",
"#f87171",
"#60a5fa"
];

const pieces=[

[],

[[1,1,1,1]],

[[2,2],[2,2]],

[[0,3,0],[3,3,3]],

[[0,4,4],[4,4,0]],

[[5,5,0],[0,5,5]],

[[6,0,0],[6,6,6]],

[[0,0,7],[7,7,7]]

];

let board=[];
let score=0;
let lines=0;
let level=1;

let paused=true;

let dropInterval=850;
let dropCounter=0;
let last=0;

/* 玩家 */

let nextPiece=createPiece();

const player={

pos:{x:0,y:0},

matrix:null

};

/* 创建方块 */

function createPiece(){

const type=
1+Math.floor(Math.random()*7);

return{
matrix:pieces[type]
};

}

/* 初始化 */

function resetData(){

board=
Array.from(
{length:ROWS},
()=>Array(COLS).fill(0)
);

score=0;
lines=0;
level=1;

dropInterval=850;

}

/* 绘制方块 */

function drawBlock(
x,y,color
){

const px=x*BLOCK;
const py=y*BLOCK;

ctx.fillStyle=color;

ctx.fillRect(
px,
py,
BLOCK,
BLOCK
);

ctx.fillStyle=
"rgba(255,255,255,.65)";

ctx.fillRect(
px+3,
py+3,
BLOCK-8,
10
);

ctx.fillStyle=
"rgba(0,0,0,.25)";

ctx.fillRect(
px+8,
py+15,
BLOCK-16,
BLOCK-20
);

ctx.strokeStyle=
"rgba(255,255,255,.85)";

ctx.lineWidth=2;

ctx.strokeRect(
px+2,
py+2,
BLOCK-4,
BLOCK-4
);

}

/* 绘制 */

function draw(){

ctx.clearRect(0,0,300,600);

for(let y=0;y<ROWS;y++){

for(let x=0;x<COLS;x++){

ctx.strokeStyle=
"rgba(255,255,255,.08)";

ctx.strokeRect(
x*BLOCK,
y*BLOCK,
BLOCK,
BLOCK
);

if(board[y][x]){

drawBlock(
x,
y,
colors[board[y][x]]
);

}

}

}

/* 当前方块 */

if(player.matrix){

player.matrix.forEach(
(row,y)=>{

row.forEach(
(v,x)=>{

if(v){

drawBlock(
x+player.pos.x,
y+player.pos.y,
colors[v]
);

}

});

});

}

}

/* 碰撞 */

function collide(){

const m=player.matrix;
const o=player.pos;

for(let y=0;y<m.length;y++){

for(let x=0;x<m[y].length;x++){

if(m[y][x]){

const newY=
y+o.y;

const newX=
x+o.x;

if(
newX<0 ||
newX>=COLS ||
newY>=ROWS
){
return true;
}

if(
newY>=0 &&
board[newY][newX]!==0
){
return true;
}

}

}

}

return false;

}

/* 合并 */

function merge(){

player.matrix.forEach(
(row,y)=>{

row.forEach(
(v,x)=>{

if(v){

board[
y+player.pos.y
][
x+player.pos.x
]=v;

}

});

});

}

/* 旋转 */

function rotate(matrix){

return matrix[0]
.map((_,i)=>
matrix.map(
r=>r[i]
).reverse()
);

}

/* 消行 */

function sweep(){

let cleared=0;

for(let y=ROWS-1;y>=0;y--){

if(
board[y].every(
cell=>cell!==0
)
){

board.splice(y,1);

board.unshift(
Array(COLS).fill(0)
);

cleared++;

y++;

}

}

if(cleared){

canvas.classList.add(
"flash"
);

setTimeout(()=>{

canvas.classList.remove(
"flash"
);

},180);

beep(880,60);

setTimeout(()=>{
beep(1350,90);
},70);

const scores=[
0,
100,
300,
500,
800
];

score+=
scores[cleared]||800;

lines+=cleared;

if(lines>=level*10){

level++;

dropInterval=
Math.max(
180,
850-level*50
);

showLevel();

beep(1600,140);

}

updateUI();

}

}

/* LEVEL */

function showLevel(){

const lv=
document.getElementById(
"levelText"
);

lv.classList.add(
"level-show"
);

setTimeout(()=>{

lv.classList.remove(
"level-show"
);

},1300);

}

/* NEXT */

function drawNext(){

nctx.clearRect(
0,0,70,70
);

const offset=
nextPiece.matrix[0]
.length===4 ? 0 : 8;

nextPiece.matrix.forEach(
(row,y)=>{

row.forEach(
(v,x)=>{

if(v){

nctx.fillStyle=
colors[v];

nctx.fillRect(
x*16+offset,
y*16+8,
14,
14
);

}

});

});

}

/* reset player */

function resetPlayer(){

player.matrix=
nextPiece.matrix;

nextPiece=
createPiece();

player.pos.y=0;

player.pos.x=
Math.floor(
COLS/2-
player.matrix[0]
.length/2
);

drawNext();

if(collide()){

gameOver();

return;

}

draw();

}

/* 左右 */

function move(dir){

player.pos.x+=dir;

if(collide()){

player.pos.x-=dir;

}else{

beep(240,18);

}

}

/* 下落 */

function playerDrop(){

player.pos.y++;

if(collide()){

player.pos.y--;

merge();

sweep();

resetPlayer();

beep(420,50);

}

dropCounter=0;

}

/* 硬降 */

function hardDrop(){

while(!collide()){

player.pos.y++;

}

player.pos.y--;

merge();

sweep();

resetPlayer();

beep(1200,80);

}

/* 旋转 */

function playerRotate(){

const old=
player.matrix;

player.matrix=
rotate(player.matrix);

if(collide()){

player.matrix=old;

}else{

beep(700,30);

}

}

/* UI */

function updateUI(){

document
.getElementById("score")
.innerText=score;

document
.getElementById("lines")
.innerText=lines;

document
.getElementById("level")
.innerText=level;

}

/* GAME OVER */

function gameOver(){

paused=true;

beep(180,400,"sawtooth");

setTimeout(()=>{
beep(120,500,"square");
},200);

const overlay=
document.getElementById(
"overlay"
);

overlay.style.display=
"flex";

overlay.innerHTML=`

<h1>GAME OVER</h1>

<button
class="start-btn"
onclick="startGame()">

RESTART

</button>

`;

}

/* update */

function update(time=0){

if(paused){

requestAnimationFrame(update);

return;

}

const delta=
time-last;

last=time;

dropCounter+=delta;

if(
dropCounter>
dropInterval
){

playerDrop();

}

draw();

requestAnimationFrame(update);

}

/* 开始 */

function startGame(){

document
.getElementById("overlay")
.style.display="none";

resetData();

paused=false;

nextPiece=
createPiece();

resetPlayer();

updateUI();

draw();

beep(600,100);

setTimeout(()=>{
beep(900,100);
},120);

}

/* 按钮 */

document
.getElementById("leftBtn")
.onclick=()=>move(-1);

document
.getElementById("rightBtn")
.onclick=()=>move(1);

document
.getElementById("downBtn")
.onclick=()=>playerDrop();

document
.getElementById("rotateBtn")
.onclick=()=>playerRotate();

document
.getElementById("hardBtn")
.onclick=()=>hardDrop();

/* 暂停 */

const pauseBtn=
document.getElementById(
"pauseBtn"
);

pauseBtn.onclick=()=>{

paused=!paused;

pauseBtn.innerText=
paused ? "▶" : "Ⅱ";

beep(500,50);

};

/* 键盘 */

document.addEventListener(
"keydown",
e=>{

if(e.key==="ArrowLeft")
move(-1);

if(e.key==="ArrowRight")
move(1);

if(e.key==="ArrowDown")
playerDrop();

if(e.key==="ArrowUp")
playerRotate();

if(e.key===" ")
hardDrop();

});

/* 开始按钮 */

document
.getElementById("startBtn")
.onclick=()=>{

startGame();

};

/* 启动 */

draw();

update();

</script>

</body>
</html>
