<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Pi Tetris</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { width:100%; height:100%; overflow:hidden; background: radial-gradient(circle at top,#0f4d92,#02142d 70%); touch-action: manipulation; }

.game-shell { position:relative; width:min(100vw,480px); aspect-ratio:9/16; max-height:100vh; margin:0 auto; overflow:hidden; }

.stars { position:absolute; inset:0; overflow:hidden; }
.star { position:absolute; width:3px; height:3px; border-radius:50%; background:white; animation:twinkle 3s infinite alternate; }
@keyframes twinkle { from{opacity:.2; transform:scale(.7);} to{opacity:1; transform:scale(1.4);} }

.play-area { position:absolute; left:50%; top:46%; transform:translate(-50%,-50%); width:58%; aspect-ratio:10/20;
    border-radius:12px; border:3px solid rgba(180,220,255,.85);
    background: linear-gradient(rgba(0,80,160,.25), rgba(0,20,50,.4));
    box-shadow: 0 0 25px rgba(100,200,255,.6), inset 0 0 30px rgba(255,255,255,.1); overflow:hidden; }

canvas { width:100%; height:100%; display:block; }

.left-ui { position:absolute; left:4%; top:12%; display:flex; flex-direction:column; gap:12px; }
.right-ui { position:absolute; right:4%; top:12%; display:flex; flex-direction:column; align-items:center; gap:12px; }

.info-box { width:68px; padding:8px 6px; border-radius:10px; background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.25); text-align:center; color:white; }

.info-title { font-size:11px; opacity:0.8; }
.info-value { font-size:22px; font-weight:bold; }

.pause-btn { width:48px; height:48px; border-radius:50%; background:rgba(0,0,0,0.6); border:2px solid rgba(255,255,255,0.4); color:white; font-size:22px; }

.next-box { width:68px; height:68px; background:rgba(0,0,0,0.5); border:2px solid rgba(255,255,255,0.25); border-radius:10px; display:flex; justify-content:center; align-items:center; }

.controls { position:absolute; left:50%; bottom:9%; transform:translateX(-50%); width:88%; display:flex; justify-content:space-around; align-items:center; }

.ctrl { width:48px; height:48px; border-radius:50%; border:none; color:white; font-size:24px; font-weight:bold;
    box-shadow: inset 0 3px 8px rgba(255,255,255,.4), 0 4px 12px rgba(0,0,0,.5); }

.left-btn  { background:linear-gradient(#86ff42,#38a800); }
.right-btn { background:linear-gradient(#ff8cff,#bf38ff); }
.down-btn  { background:linear-gradient(#4dfff3,#00a8a0); }
.rotate-btn{ background:linear-gradient(#ffb18f,#ff5b4f); }
</style>
</head>
<body>

<div class="game-shell">
    <div class="stars" id="stars"></div>

    <div class="left-ui">
        <div class="info-box">
            <div class="info-title">SCORE</div>
            <div class="info-value" id="score">0</div>
        </div>
        <div class="info-box">
            <div class="info-title">LINES</div>
            <div class="info-value" id="lines">0</div>
        </div>
    </div>

    <div class="right-ui">
        <button class="pause-btn" id="pauseBtn">Ⅱ</button>
        <div class="next-box"><canvas id="next" width="60" height="60"></canvas></div>
    </div>

    <div class="play-area">
        <canvas id="board"></canvas>
    </div>

    <div class="controls">
        <button class="ctrl left-btn" id="leftBtn">←</button>
        <button class="ctrl rotate-btn" id="rotateBtn">↻</button>
        <button class="ctrl right-btn" id="rightBtn">→</button>
        <button class="ctrl down-btn" id="downBtn">↓</button>
    </div>
</div>

<script>
// 音效 + 游戏逻辑
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, duration, type = 'sine', vol = 0.3) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type; osc.frequency.value = freq; gain.gain.value = vol;
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(); setTimeout(() => osc.stop(), duration);
}

const COLS=10, ROWS=20;
const canvas=document.getElementById("board");
const ctx=canvas.getContext("2d");
canvas.width=300; canvas.height=600;
const BLOCK=30;

const nextCanvas=document.getElementById("next");
const nctx=nextCanvas.getContext("2d");

const colors=[null,"#67e8f9","#fef08c","#c084fc","#86efac","#fb923c","#f87171","#60a5fa"];

const pieces=[[], [[1,1,1,1]], [[2,2],[2,2]], [[0,3,0],[3,3,3]], [[0,4,4],[4,4,0]],
    [[5,5,0],[0,5,5]], [[6,0,0],[6,6,6]], [[0,0,7],[7,7,7]] ];

let board = Array.from({length:ROWS}, () => Array(COLS).fill(0));
let score=0, lines=0, level=1, dropInterval=920, dropCounter=0, last=0, paused=false;

let nextPiece = createPiece();
const player = { pos:{x:0,y:0}, matrix:null };

function createPiece(){
    const type = 1 + Math.floor(Math.random()*7);
    return { matrix: pieces[type] };
}

function drawBlock(x, y, color) {
    const px = x * BLOCK, py = y * BLOCK;
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.88;
    ctx.fillRect(px, py, BLOCK, BLOCK);
    ctx.globalAlpha = 1;

    ctx.fillStyle = "rgba(255,255,255,0.75)";
    ctx.fillRect(px + 3, py + 3, BLOCK-8, 10);
    
    ctx.fillStyle = "rgba(0,0,0,0.45)";
    ctx.fillRect(px + 8, py + 14, BLOCK-16, BLOCK-20);

    ctx.strokeStyle = "rgba(255,255,255,0.9)";
    ctx.lineWidth = 2.5;
    ctx.strokeRect(px + 2, py + 2, BLOCK-4, BLOCK-4);
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(let y=0; y<ROWS; y++){
        for(let x=0; x<COLS; x++){
            ctx.strokeStyle = "rgba(255,255,255,0.15)";
            ctx.strokeRect(x*BLOCK, y*BLOCK, BLOCK, BLOCK);
            if(board[y][x]) drawBlock(x, y, colors[board[y][x]]);
        }
    }
    player.matrix.forEach((row,y) => {
        row.forEach((v,x) => { if(v) drawBlock(x + player.pos.x, y + player.pos.y, colors[v]); });
    });
}

function collide(){
    const m = player.matrix, o = player.pos;
    for(let y=0; y<m.length; y++){
        for(let x=0; x<m[y].length; x++){
            if(m[y][x] && (!board[y+o.y] || board[y+o.y][x+o.x] !== 0)) return true;
        }
    }
    return false;
}

function merge(){ player.matrix.forEach((row,y) => row.forEach((v,x) => { if(v) board[y+player.pos.y][x+player.pos.x] = v; })); }

function rotate(matrix){ return matrix[0].map((_,i) => matrix.map(r => r[i]).reverse()); }

function sweep(){
    let cleared = 0;
    for(let y=ROWS-1; y>=0; y--){
        if(board[y].every(cell => cell !== 0)){
            board.splice(y,1);
            board.unshift(Array(COLS).fill(0));
            cleared++; y++;
        }
    }
    if(cleared){
        playSound(880,70); setTimeout(()=>playSound(1350,110),70);
        const scores = [0,100,300,500,800];
        score += scores[cleared] || 800;
        lines += cleared;
        if(lines >= level*12){
            level++;
            dropInterval = Math.max(280, 920 - level*45);
        }
        updateUI();
    }
}

function drawNext(){
    nctx.clearRect(0,0,60,60);
    const offset = nextPiece.matrix[0].length === 4 ? 0 : 8;
    nextPiece.matrix.forEach((row,y)=> row.forEach((v,x)=>{ 
        if(v){ nctx.fillStyle=colors[v]; nctx.fillRect(x*15+offset, y*15+8, 13,13); }
    }));
}

function resetPlayer(){
    player.matrix = nextPiece.matrix;
    nextPiece = createPiece();
    player.pos.y = 0;
    player.pos.x = (COLS/2 | 0) - (player.matrix[0].length/2 | 0);
    drawNext();
}

function playerDrop(){
    player.pos.y++;
    if(collide()){
        player.pos.y--; merge(); sweep(); resetPlayer(); playSound(420,55);
    } else playSound(260,18,'sine',0.1);
}

function move(dir){
    player.pos.x += dir;
    if(collide()) player.pos.x -= dir;
}

function playerRotate(){
    const old = player.matrix;
    player.matrix = rotate(player.matrix);
    if(collide()) player.matrix = old;
}

function updateUI(){
    document.getElementById("score").innerText = score;
    document.getElementById("lines").innerText = lines;
}

function update(time=0){
    if(paused) return requestAnimationFrame(update);
    const delta = time - last; last = time;
    dropCounter += delta;
    if(dropCounter > dropInterval){ playerDrop(); dropCounter=0; }
    draw();
    requestAnimationFrame(update);
}

// 按钮
document.getElementById("leftBtn").onclick = () => move(-1);
document.getElementById("rightBtn").onclick = () => move(1);
document.getElementById("downBtn").onclick = () => playerDrop();
document.getElementById("rotateBtn").onclick = playerRotate;

document.getElementById("pauseBtn").onclick = () => paused = !paused;

// 键盘
document.addEventListener("keydown", e => {
    if(e.key==="ArrowLeft") move(-1);
    if(e.key==="ArrowRight") move(1);
    if(e.key==="ArrowDown") playerDrop();
    if(e.key==="ArrowUp") playerRotate();
});

function startGame(){
    board = Array.from({length:ROWS}, () => Array(COLS).fill(0));
    score=0; lines=0; level=1; dropInterval=920; paused=false;
    nextPiece = createPiece(); resetPlayer(); updateUI();
}

// 星星
for(let i=0; i<65; i++){
    const s = document.createElement("div");
    s.className="star";
    s.style.left = Math.random()*100 + "%";
    s.style.top = Math.random()*100 + "%";
    s.style.animationDelay = Math.random()*4 + "s";
    document.getElementById("stars").appendChild(s);
}

startGame();
update();
</script>
</body>
</html>
